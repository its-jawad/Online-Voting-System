<!DOCTYPE html>
<html>
<head>
    <title>Admin Authentication</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div id="adminLoginBox">
        <h2>Admin Login</h2>
        <input id="alu" placeholder="Username">
        <input id="alp" type="password" placeholder="Password">
        <button onclick="loginAdmin()">Login</button>
        <a onclick="showAdminRegister()">Register</a>
    </div>

    <div id="adminRegisterBox" style="display:none;">
        <h2>Admin Registration</h2>
        <input id="au" placeholder="Username">
        <input id="ae" placeholder="Email">
        <input id="ap" type="password" placeholder="Password">
        <input id="acp" type="password" placeholder="Confirm Password">
        <button onclick="registerAdmin()">Register</button>
        <a onclick="showAdminLogin()">Back to Login</a>
    </div>

</div>

<script src="js/model.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
